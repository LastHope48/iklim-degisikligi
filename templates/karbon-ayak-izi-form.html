<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Karbon Ayak İzi Hesaplayıcısı</title>
    <link
      rel="icon"
      href="{{url_for('static', filename='img/climate-change-icon.ico')}}"
    />
    <link rel="stylesheet" href="../static/css/form.css" />
  </head>
  <body>
    <form id="carbonForm">
      <label for="car">Haftada kaç gün araba kullanıyorsunuz?</label><br />
      <select id="car">
        <option value="0">Hiç</option>
        <option value="5">1-3 gün</option>
        <option value="10">4-7 gün</option>
      </select>

      <br /><br />

      <label for="led">Evde ampullerin çoğu LED mi?</label><br />
      <select id="led">
        <option value="0">Evet</option>
        <option value="3">Bir kısmı</option>
        <option value="8">Hayır</option>
      </select>

      <br /><br />

      <label for="transport">Toplu taşıma kullanıyor musunuz?</label><br />
      <select id="transport">
        <option value="0">Sık sık</option>
        <option value="3">Bazen</option>
        <option value="8">Hiç</option>
      </select>

      <br /><br />

      <label for="recycle">Geri dönüşüm yapıyor musunuz?</label><br />
      <select id="recycle">
        <option value="0">Her zaman</option>
        <option value="3">Ara sıra</option>
        <option value="8">Hiç</option>
      </select>

      <br /><br />

      <label for="lights">Gereksiz yere ışıkları açık bırakıyor musunuz?</label
      ><br />
      <select id="lights">
        <option value="0">Hayır</option>
        <option value="4">Bazen</option>
        <option value="8">Evet</option>
      </select>

      <br /><br />

      <label for="plastic">Tek kullanımlık plastik kullanıyor musunuz?</label
      ><br />
      <select id="plastic">
        <option value="0">Çok az</option>
        <option value="4">Ara sıra</option>
        <option value="8">Sık sık</option>
      </select>

      <br /><br />

      <label for="water">Evde su tasarrufu yapıyor musunuz?</label><br />
      <select id="water">
        <option value="0">Evet</option>
        <option value="3">Bazen</option>
        <option value="7">Hayır</option>
      </select>

      <br /><br />

      <label for="tree"
        >Ağaç dikme veya çevre etkinliklerine katılıyor musunuz?</label
      ><br />
      <select id="tree">
        <option value="-5">Evet</option>
        <option value="0">Nadiren</option>
        <option value="3">Hiç</option>
      </select>

      <br /><br />

      <button type="button" onclick="hesapla()">
        Karbon Ayak İzimi Hesapla
      </button>
    </form>

    <h2 id="sonuc"></h2>
    <progress id="bar" max="100" value="0"></progress>
    <script src="../static/js/form-script.js"></script>
  </body>
</html>
